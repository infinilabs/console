# setting version for console select install agent tpl and download agent version
agent:
  setup:
    install_dir: /infini/agent

gateway:
  setup:
    install_dir: /infini/gateway

http_client:
  default:
    tls:
      skip_insecure_verify: true
      skip_domain_verify: true
    proxy:
      enabled: false
      default_config:
        using_proxy_env: true
